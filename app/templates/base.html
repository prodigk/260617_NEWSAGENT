<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}IT Brief{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="/" aria-label="IT Brief 홈">
        <span class="brand-mark">IT</span>
        <span>IT Brief</span>
      </a>
      <nav class="main-nav" id="main-nav" aria-label="주요 화면">
        <a href="/">뉴스</a>
        <a href="/keywords">키워드</a>
        <a href="/sentiment">감정</a>
        <a href="/search">의미검색</a>
        <a href="/status">수집상태</a>
      </nav>
      <div class="header-actions">
        <span class="last-updated">
          {% if latest_job %}{{ latest_job.finished_at or latest_job.started_at }}{% else %}수집 전{% endif %}
        </span>
        <form action="/refresh" method="post">
          <button class="refresh-button" type="submit">최근기사 불러오기</button>
        </form>
        <button class="menu-button" type="button" aria-label="메뉴 열기" aria-controls="main-nav" aria-expanded="false"><span></span><span></span></button>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', path='app.js') }}"></script>
  </body>
</html>
